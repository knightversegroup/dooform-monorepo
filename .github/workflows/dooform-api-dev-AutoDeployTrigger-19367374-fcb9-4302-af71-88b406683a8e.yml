name: Trigger auto deployment for dooform-api-dev

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/dooform-api-dev-AutoDeployTrigger-19367374-fcb9-4302-af71-88b406683a8e.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.DOOFORMAPIDEV_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.DOOFORMAPIDEV_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.DOOFORMAPIDEV_AZURE_SUBSCRIPTION_ID }}

      - name: Run database migrations (Azure CLI)
        # Applies every apps/dooform-api/src/database/migrations/*.sql file in
        # chronological order against the Azure Database for PostgreSQL
        # Flexible Server using `az postgres flexible-server execute`. The CLI
        # opens a temporary firewall hole for the runner IP for the duration
        # of the call — no manual psql, no inbound IP management.
        #
        # Required repo secrets (Settings -> Secrets and variables -> Actions):
        #   DOOFORMAPIDEV_PG_SERVER     name of the flexible-server resource
        #                                (e.g. dooform-pg-dev — NOT the FQDN)
        #   DOOFORMAPIDEV_PG_DATABASE   target database (e.g. dooform)
        #   DOOFORMAPIDEV_PG_USER       admin or migration user
        #   DOOFORMAPIDEV_PG_PASSWORD   that user's password
        #
        # If the PG_SERVER secret is unset, the step warns and exits 0 so a
        # first-time setup deploy isn't blocked. Once secrets are configured
        # every push runs migrations before the container rolls out — a
        # migration failure aborts the workflow with `set -euo pipefail`.
        env:
          PG_SERVER: ${{ secrets.DOOFORMAPIDEV_PG_SERVER }}
          PG_DATABASE: ${{ secrets.DOOFORMAPIDEV_PG_DATABASE }}
          PG_ADMIN_USER: ${{ secrets.DOOFORMAPIDEV_PG_USER }}
          PG_ADMIN_PASSWORD: ${{ secrets.DOOFORMAPIDEV_PG_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${PG_SERVER:-}" ]]; then
            echo "::warning::DOOFORMAPIDEV_PG_SERVER secret is not set — skipping migrations. Configure PG_SERVER / PG_DATABASE / PG_USER / PG_PASSWORD to enable automatic migration during deploy."
            exit 0
          fi
          # rdbms-connect is the CLI extension that adds the `execute` and
          # `connect` subcommands. --yes is required for non-interactive runs.
          az extension add --name rdbms-connect --yes --upgrade
          shopt -s nullglob
          files=(apps/dooform-api/src/database/migrations/*.sql)
          if (( ${#files[@]} == 0 )); then
            echo "No migration files found — nothing to do."
            exit 0
          fi
          # Lexicographic sort lines up with the YYYY-MM-DD-* naming convention.
          IFS=$'\n' sorted=($(LC_ALL=C printf '%s\n' "${files[@]}" | sort))
          echo "Applying ${#sorted[@]} migration(s) to $PG_SERVER/$PG_DATABASE"
          for f in "${sorted[@]}"; do
            echo "→ $(basename "$f")"
            az postgres flexible-server execute \
              --name "$PG_SERVER" \
              --admin-user "$PG_ADMIN_USER" \
              --admin-password "$PG_ADMIN_PASSWORD" \
              --database-name "$PG_DATABASE" \
              --file-path "$f"
          done
          echo "All migrations applied."

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: apps/dooform-api/Dockerfile
          registryUrl: dooformacrprod.azurecr.io
          registryUsername: ${{ secrets.DOOFORMAPIDEV_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.DOOFORMAPIDEV_REGISTRY_PASSWORD }}
          containerAppName: dooform-api-dev
          resourceGroup: dooform-prod-rg
          imageToBuild: dooformacrprod.azurecr.io/dooform-api-dev:${{ github.sha }}


