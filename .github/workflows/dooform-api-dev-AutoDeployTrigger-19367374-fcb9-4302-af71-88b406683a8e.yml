name: Trigger auto deployment for dooform-api-dev

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/dooform-api-dev-AutoDeployTrigger-19367374-fcb9-4302-af71-88b406683a8e.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Run database migrations
        # Idempotent SQL migrations from apps/dooform-api/src/database/migrations/*.sql
        # are applied chronologically. Failures abort before the container deploy
        # so a half-migrated DB can never end up paired with a new container.
        # Requires a DATABASE_URL secret pointing at the dev tenant's postgres.
        # If the secret is unset, the step emits a warning and exits 0 so the
        # workflow continues — handy for first-time setup before the secret is
        # configured.
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [[ -z "${DATABASE_URL:-}" ]]; then
            echo "::warning::DATABASE_URL secret is not set — skipping migrations. Configure it in repo settings to enable automatic migration during deploy."
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client
          bash apps/dooform-api/src/database/migrate.sh

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.DOOFORMAPIDEV_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.DOOFORMAPIDEV_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.DOOFORMAPIDEV_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: apps/dooform-api/Dockerfile
          registryUrl: dooformacrprod.azurecr.io
          registryUsername: ${{ secrets.DOOFORMAPIDEV_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.DOOFORMAPIDEV_REGISTRY_PASSWORD }}
          containerAppName: dooform-api-dev
          resourceGroup: dooform-prod-rg
          imageToBuild: dooformacrprod.azurecr.io/dooform-api-dev:${{ github.sha }}


